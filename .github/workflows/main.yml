name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Unzip project
        run: unzip crowd-express-android.zip

      - name: Fix gradle files
        run: |
          cat > crowd-express-android/build.gradle << 'EOF'
          buildscript {
              ext.kotlin_version = '1.8.0'
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:7.4.2'
                  classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
              }
          }
          task clean(type: Delete) {
              delete rootProject.buildDir
          }
          EOF
          cat > crowd-express-android/settings.gradle << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "CrowdExpressSolver"
          include ':app'
          EOF

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '7.6'

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon
        working-directory: crowd-express-android

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: crowd-express-solver-debug
          path: crowd-express-android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
